name: Eval Runner Conformance

on:
  pull_request:
    paths:
      - "packages/eval-runner/**"
      - ".github/workflows/eval-runner-conformance.yml"
  push:
    branches:
      - main
    paths:
      - "packages/eval-runner/**"
      - ".github/workflows/eval-runner-conformance.yml"

permissions:
  contents: read

jobs:
  eval-runner-conformance:
    name: Eval runner conformance gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.14"

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Eval runner conformance
        run: bun run --cwd packages/eval-runner test

      - name: Eval runner typecheck
        run: bun run --cwd packages/eval-runner typecheck

      - name: Typecheck
        run: bun run typecheck

      - name: Proof v0
        run: bun run proof:v0
