id: source_fidelity
description: Verify important plan claims are backed by recorded evidence.
type: source_fidelity
datasetRef:
  id: specwright.default.source_fidelity
  version: "1.0.0"
  path: packages/eval-runner/fixtures/default-datasets/source_fidelity.json
  contentId: sha256:f9202ee5ce4d13ec541115f461254eda47d55b7e68ec3f82af32f0c95ce11996
target:
  artifactId: plan
artifactSchemas:
  - plan
  - evidence-graph
requiredArtifacts:
  - plan
  - evidence-graph
claimsPath: claims
blocking: true
checks:
  - id: important_claims_have_evidence
    type: source_fidelity
    claimsPath: claims
    importantClaimLevels:
      - source_fact
      - derived_fact
      - inference
      - human_decision
onFail:
  action: create_repair_task
