id: source_fidelity
description: Verify important plan claims are backed by recorded evidence.
type: source_fidelity
datasetRef:
  id: specwright.default.source_fidelity
  version: "1.0.0"
  path: packages/eval-runner/fixtures/default-datasets/source_fidelity.json
  contentId: sha256:6961cf3d4ea30e9dfa998d2de6b9a567902a2dd2bde350ff4692d5cf885dd960
target:
  artifactId: plan
artifactSchemas:
  - plan
  - evidence-graph
requiredArtifacts:
  - plan
  - evidence-graph
claimsPath: claims
blocking: true
checks:
  - id: important_claims_have_evidence
    type: source_fidelity
    claimsPath: claims
    importantClaimLevels:
      - source_fact
      - derived_fact
      - inference
      - human_decision
onFail:
  action: create_repair_task
