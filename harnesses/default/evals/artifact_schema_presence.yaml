id: artifact_schema_presence
description: Ensure the plan artifact exists and exposes required schema fields.
type: deterministic
datasetRef:
  id: specwright.default.artifact_schema_presence
  version: "1.0.0"
  path: packages/eval-runner/fixtures/default-datasets/artifact_schema_presence.json
  contentId: sha256:896633eb17fd58a9b965f322d233b90f7424be32f0306dd9c02bceb41590521b
target:
  artifactId: plan
artifactSchemas:
  - plan
requiredArtifacts:
  - plan
blocking: true
checks:
  - id: plan_required_fields
    type: schema
    requiredFields:
      - goal
      - steps
      - claims
      - sections
  - id: plan_sections_required
    type: schema
    path: sections
    requiredFields:
      - goal
      - evidence
      - steps
      - risks
      - verification
onFail:
  action: create_repair_task
