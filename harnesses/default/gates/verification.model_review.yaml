id: verification.model_review
phase: verification
kind: eval
required: true
description: Run a constrained model-assisted review after deterministic verification checks pass.
inputs:
  artifacts:
    - summary.md
  evals:
    - artifact_schema_presence
checks:
  - id: summary_present
    type: schema
    artifactId: summary.md
    requiredFields:
      - content
      - sections
  - id: artifact_schema_presence_passed
    type: eval
    evalId: artifact_schema_presence
    status: pass
  - id: model_review
    type: model_assisted
    modelTool: model.review
    inputSchema:
      type: object
      additionalProperties: false
      required:
        - artifacts
      properties:
        artifacts:
          type: object
          additionalProperties: false
          required:
            - summary
          properties:
            summary:
              type: object
              additionalProperties: false
              required:
                - content
              properties:
                content:
                  type: object
                  additionalProperties: false
                  required:
                    - text
                  properties:
                    text:
                      type: string
    outputSchema:
      type: object
      additionalProperties: false
      required:
        - status
        - message
      properties:
        status:
          enum:
            - clean
            - review
            - blocking
        message:
          type: string
        targetRef:
          type: string
        evidenceRefs:
          type: array
          items:
            type: string
    rubric:
      ref: rubric://verification/model-review@v1
      hash: sha256:rubricmodelreview000000000000000000000000000000000000000000000
    allowedContextRefs:
      - $.artifacts.summary.content
    maxTokens: 200
    onInvalidOutput: fail
onFail:
  action: create_repair_task
  repairHint: Resolve deterministic verification failures or clarify the model-assisted finding.
  successGate: verification.model_review
onPass:
  action: transition_phase
  targetPhase: packaging
