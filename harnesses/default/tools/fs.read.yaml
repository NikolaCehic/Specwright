id: fs.read
kind: filesystem
description: Read a UTF-8 file from the workspace as source evidence.
version: 0.1.0
inputSchema:
  type: object
  additionalProperties: false
  required:
    - path
  properties:
    path:
      type: string
      minLength: 1
    encoding:
      type: string
      enum:
        - utf8
    maxBytes:
      type: number
      minimum: 1
outputSchema:
  type: object
  additionalProperties: false
  required:
    - path
    - content
    - encoding
    - bytesRead
    - truncated
  properties:
    path:
      type: string
    content:
      type: string
    encoding:
      type: string
      enum:
        - utf8
    bytesRead:
      type: number
      minimum: 0
    truncated:
      type: boolean
adapter: adapters/filesystem/read
risk: low
policy:
  allowedPhases:
    - source_discovery
    - evidence
    - verification
  approval: none
  scopes: ["workspace:read"]
  limits:
    timeoutMs: 30000
    maxBytes: 200000
cache:
  enabled: true
  key:
    - toolId
    - toolVersion
    - path
    - fileHash
observability:
  recordArgs: true
  recordResultHash: true
  redact:
    - secrets
